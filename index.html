<style>
/* Reset & base */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url("worship.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px;
    color:white;
    text-align:center;
}

/* Heading */
h1{
    margin-top:30px;
    font-size:2.3rem;
}

.subtitle{
    margin-bottom:25px;
    font-size:1rem;
    opacity:0.9;
}

/* Banner */
.banner{
    background:#ff0000;
    padding:12px 25px;
    border-radius:25px;
    margin-bottom:20px;
    font-weight:bold;
    box-shadow:0 0 15px rgba(255,0,0,0.8);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px rgba(255,0,0,0.6);}
    50%{box-shadow:0 0 25px rgba(255,0,0,1);}
    100%{box-shadow:0 0 10px rgba(255,0,0,0.6);}
}

/* Buttons */
.link-button{
    display:block;
    width:85%;
    max-width:320px;
    margin:10px 0;
    padding:16px;
    font-size:1rem;
    font-weight:bold;
    text-decoration:none;
    color:white;
    border-radius:40px;
    transition:all 0.3s ease;
}

.link-button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(255,255,255,0.9);
}

/* Colors */
.spotify{background:#1DB954;}
.apple{background:#000;}
.amazon{background:#FF9900;}
.youtube{background:#FF0000;}
.deezer{background:#0071CE;}
.boomplay{background:#E60012;}
.tiktok{background:#010101;}
.pinterest{background:#E60023;}
.facebook{background:#1877F2;}
.x{background:#1DA1F2;}

/* Embed containers */
.embed-container{
    position:relative;
    width:100%;
    max-width:640px;
    margin:20px 0;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}
.embed-container iframe{
    width:100%;
    height:100%;
    min-height:315px;
}

/* Responsive adjustments */
@media(max-width:500px){
    h1{font-size:1.8rem;}
    .subtitle{font-size:0.95rem;}
    .banner{padding:10px 18px;font-size:0.9rem;}
    .link-button{font-size:0.95rem;padding:14px;}
}
</style>
</head>
